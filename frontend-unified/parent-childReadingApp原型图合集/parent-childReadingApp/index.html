<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅桥亲子阅读APPAPP原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .prototype-container {
            width: 390px; /* iPhone 15 Pro width */
            height: 844px; /* iPhone 15 Pro height */
            border-radius: 55px;
            overflow: hidden;
            position: relative;
            margin: 20px;
            border: 12px solid #1a1a1a;
            display: inline-block;
        }
        .status-bar {
            height: 34px; /* 减小状态栏高度 */
            background-color: #fff; /* 改为白色背景 */
            position: relative;
            z-index: 1000;
        }
        .status-bar-child {
            height: 34px; /* 减小状态栏高度 */
            background: linear-gradient(135deg, #6366f1, #8b5cf6); /* 孩子端紫色背景 */
            position: relative;
            z-index: 1000;
        }
        .status-bar-select {
            height: 34px; /* 减小状态栏高度 */
            background: linear-gradient(135deg, #dbeafe, #eff6ff); /* 选择页面背景 */
            position: relative;
            z-index: 1000;
        }
        .status-bar-video {
            height: 34px; /* 减小状态栏高度 */
            background-color: transparent; /* 透明背景 */
            position: relative;
            z-index: 1000;
        }
        .dynamic-island {
            position: absolute;
            top: 8px; /* 调整位置 */
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 25px; /* 减小高度 */
            background: #000;
            border-radius: 20px;
        }
        .prototype-frame {
            width: 100%;
            height: calc(100% - 34px); /* 调整iframe高度 */
            border: none;
        }
        .prototype-frame-full {
            width: 100%;
            height: 100%; /* 全高度iframe */
            border: none;
        }
        .section-title {
            font-size: 2rem;
            font-weight: bold;
            margin: 2rem 0 1rem;
            color: #333;
            text-align: center;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid #6366f1;
            display: inline-block;
        }
        .section-container {
            margin-bottom: 3rem;
        }
        .feature-tag {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #10B981;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 1001;
        }
        .section-description {
            text-align: center;
            color: #666;
            max-width: 800px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-4xl font-bold text-center mb-4">阅桥亲子阅读APPAPP原型</h1>
    <p class="text-xl text-center text-gray-600 mb-8">基于AI的智能互动阅读平台</p>
    
    <!-- 选择页面 -->
    <div class="section-container">
        <h2 class="section-title mx-auto">选择页面</h2>
        <p class="section-description">为家长和孩子提供独立的入口，打造差异化的用户体验</p>
        <div class="flex justify-center">
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar-select">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="select.html" class="prototype-frame"></iframe>
            </div>
        </div>
    </div>
    
    <!-- 家长端 -->
    <div class="section-container">
        <h2 class="section-title mx-auto">家长端</h2>
        <p class="section-description">
            专为家长设计的智能阅读管理平台，整合家庭群组、AI互动、阅读追踪等功能，
            帮助家长更好地参与和指导孩子的阅读成长。
        </p>
        <div class="flex flex-wrap justify-center gap-8">
            <!-- 登录页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/login.html" class="prototype-frame"></iframe>
            </div>

            <!-- 注册页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/register.html" class="prototype-frame"></iframe>
            </div>

            <!-- 首页 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">新版本</div>
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/home.html" class="prototype-frame"></iframe>
            </div>

            <!-- 阅读页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/reading.html" class="prototype-frame"></iframe>
            </div>

            <!-- 视频页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/video-feed.html" class="prototype-frame"></iframe>
            </div>

            <!-- AI对话页面 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">AI升级</div>
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/ai-chat.html" class="prototype-frame"></iframe>
            </div>

            <!-- 个人中心页面 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">新功能</div>
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/profile.html" class="prototype-frame"></iframe>
            </div>

            <!-- 亲密度排行榜页面 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">全新功能</div>
                <div class="status-bar">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/parent/intimacy-ranking.html" class="prototype-frame"></iframe>
            </div>
        </div>
    </div>
    
    <!-- 孩子端 -->
    <div class="section-container">
        <h2 class="section-title mx-auto">孩子端</h2>
        <p class="section-description">
            专为儿童打造的趣味阅读空间，融合智能推荐、互动游戏和家庭社交，
            让阅读变得更有趣、更有意义。
        </p>
        <div class="flex flex-wrap justify-center gap-8">
            <!-- 登录页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/login.html" class="prototype-frame"></iframe>
            </div>

            <!-- 注册页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/register.html" class="prototype-frame"></iframe>
            </div>
            
            <!-- 首页 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">全新设计</div>
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/home.html" class="prototype-frame"></iframe>
            </div>

            <!-- 阅读页面 -->
            <div class="prototype-container bg-white shadow-xl">
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/video-feed.html" class="prototype-frame"></iframe>
            </div>

            <!-- AI对话页面 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">趣味升级</div>
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/ai-chat.html" class="prototype-frame"></iframe>
            </div>

            <!-- 成就页面 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">新功能</div>
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/profile.html" class="prototype-frame"></iframe>
            </div>
            
            <!-- 家庭关系分析页面 -->
            <div class="prototype-container bg-white shadow-xl relative">
                <div class="feature-tag">家庭关系</div>
                <div class="status-bar-child">
                    <div class="dynamic-island"></div>
                </div>
                <iframe src="pages/child/family-analysis.html" class="prototype-frame"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
