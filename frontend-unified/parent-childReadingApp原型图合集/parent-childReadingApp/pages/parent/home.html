<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长端首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-lg p-4 flex justify-between items-center">
        <div class="flex items-center">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=dad123&backgroundColor=b6e3f4" alt="家长头像" class="w-10 h-10 rounded-full object-cover">
            <div class="ml-3">
                <h2 class="text-lg font-semibold">欢迎回来</h2>
                <p class="text-sm text-gray-500">张爸爸</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button class="p-2 rounded-full bg-gray-100">
                <i class="fas fa-bell text-gray-600"></i>
            </button>
            <button class="p-2 rounded-full bg-gray-100">
                <i class="fas fa-cog text-gray-600"></i>
            </button>
        </div>
    </nav>

    <!-- 家庭群组卡片 -->
    <div class="p-4">
        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h3 class="text-lg font-semibold mb-3">家庭成员</h3>
            <div class="flex gap-4 overflow-x-auto pb-2">
                <!-- 爸爸 -->
                <div class="flex flex-col items-center min-w-[60px]">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=dad123&backgroundColor=b6e3f4" alt="爸爸头像" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-sm mt-1">爸爸</span>
                    <span class="text-xs text-gray-500">亲密度:95</span>
                </div>
                <!-- 妈妈 -->
                <div class="flex flex-col items-center min-w-[60px]">
                    <div class="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=mom456" alt="妈妈头像" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-sm mt-1">妈妈</span>
                    <span class="text-xs text-gray-500">亲密度:98</span>
                </div>
                <!-- 爷爷 -->
                <div class="flex flex-col items-center min-w-[60px]">
                    <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=grandpa789" alt="爷爷头像" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-sm mt-1">爷爷</span>
                    <span class="text-xs text-gray-500">亲密度:88</span>
                </div>
                <!-- 奶奶 -->
                <div class="flex flex-col items-center min-w-[60px]">
                    <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=grandma012" alt="奶奶头像" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-sm mt-1">奶奶</span>
                    <span class="text-xs text-gray-500">亲密度:90</span>
                </div>
                <!-- 小明（孩子） -->
                <div class="flex flex-col items-center min-w-[60px]">
                    <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=xiaoming345" alt="小明头像" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-sm mt-1">小明</span>
                    <span class="text-xs text-gray-500">亲密度:100</span>
                </div>
                <!-- 添加成员按钮 -->
                <div class="flex flex-col items-center min-w-[60px]">
                    <button class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center">
                        <i class="fas fa-plus text-gray-400"></i>
                    </button>
                    <span class="text-sm mt-1 text-gray-400">添加</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 亲密度排行榜入口 -->
    <div class="p-4">
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl p-4 shadow-sm mb-4 relative overflow-hidden">
            <div class="absolute right-0 bottom-0 opacity-10">
                <i class="fas fa-trophy text-9xl text-white"></i>
            </div>
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-semibold text-white mb-2">亲密度排行榜</h3>
                    <p class="text-sm text-white/80 mb-4">您目前在全网家长榜单中排名第<span class="font-bold text-yellow-300">21</span>位</p>
                    <a href="intimacy-ranking.html" class="inline-block px-4 py-2 bg-white/20 hover:bg-white/30 rounded-full text-white text-sm transition-colors">
                        <i class="fas fa-crown mr-1"></i>查看排行榜
                    </a>
                </div>
                <div class="bg-white/20 rounded-full p-5 hidden md:flex">
                    <div class="relative">
                        <div class="text-3xl font-bold text-white">92%</div>
                        <div class="text-xs text-white/80">您的亲密度</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 阅读进度追踪 -->
    <div class="p-4">
        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h3 class="text-lg font-semibold mb-3">阅读进度</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <div>
                        <h4 class="font-medium">当前阅读</h4>
                        <p class="text-sm text-gray-500">《小王子》第3章</p>
                    </div>
                    <div class="w-20 h-20 rounded-lg bg-gray-100">
                        <img src="https://m.media-amazon.com/images/I/71OZY035QKL._AC_UF1000,1000_QL80_.jpg" alt="小王子封面" class="w-full h-full object-cover">
                    </div>
                </div>
                <div class="h-2 bg-gray-200 rounded-full">
                    <div class="h-2 bg-purple-500 rounded-full" style="width: 60%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 推荐阅读 -->
    <div class="p-4">
        <h3 class="text-lg font-semibold mb-3">基于兴趣推荐</h3>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-3 rounded-xl shadow-sm">
                <div class="w-full h-32 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1994258.jpg" alt="格林童话" class="w-full h-full object-cover">
                </div>
                <h4 class="font-medium">格林童话</h4>
                <p class="text-sm text-gray-500">适合6-8岁</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm">
                <div class="w-full h-32 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                    <img src="https://img9.doubanio.com/view/subject/s/public/s1034062.jpg" alt="安徒生童话" class="w-full h-full object-cover">
                </div>
                <h4 class="font-medium">安徒生童话</h4>
                <p class="text-sm text-gray-500">适合6-8岁</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm">
                <div class="w-full h-32 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1451172.jpg" alt="三国演义" class="w-full h-full object-cover">
                </div>
                <h4 class="font-medium">三国演义（少年版）</h4>
                <p class="text-sm text-gray-500">适合9-12岁</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm">
                <div class="w-full h-32 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                    <img src="https://img2.doubanio.com/view/subject/s/public/s1147854.jpg" alt="水浒传" class="w-full h-full object-cover">
                </div>
                <h4 class="font-medium">水浒传（少年版）</h4>
                <p class="text-sm text-gray-500">适合9-12岁</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm">
                <div class="w-full h-32 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1148238.jpg" alt="西游记" class="w-full h-full object-cover">
                </div>
                <h4 class="font-medium">西游记（少年版）</h4>
                <p class="text-sm text-gray-500">适合9-12岁</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm">
                <div class="w-full h-32 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                    <img src="https://img9.doubanio.com/view/subject/s/public/s29053580.jpg" alt="小王子" class="w-full h-full object-cover">
                </div>
                <h4 class="font-medium">小王子</h4>
                <p class="text-sm text-gray-500">适合8-12岁</p>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-2">
        <a href="home.html" class="flex flex-col items-center text-purple-500">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs mt-1">首页</span>
        </a>
        <a href="reading.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-book-reader text-xl"></i>
            <span class="text-xs mt-1">阅读</span>
        </a>
        <a href="ai-chat.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-comments text-xl"></i>
            <span class="text-xs mt-1">对话</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-xs mt-1">我的</span>
        </a>
    </nav>
</body>
</html>
