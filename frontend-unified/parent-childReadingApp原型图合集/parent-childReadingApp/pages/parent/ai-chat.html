<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container {
            height: calc(100vh - 140px);
            overflow-y: auto;
        }
        .message-input {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            background-color: white;
        }
        .typing-indicator {
            display: none;
        }
        .typing-indicator span {
            height: 10px;
            width: 10px;
            float: left;
            margin: 0 1px;
            background-color: #9E9EA1;
            display: block;
            border-radius: 50%;
            opacity: 0.4;
        }
        .typing-indicator span:nth-of-type(1) {
            animation: 1s blink infinite 0.3333s;
        }
        .typing-indicator span:nth-of-type(2) {
            animation: 1s blink infinite 0.6666s;
        }
        .typing-indicator span:nth-of-type(3) {
            animation: 1s blink infinite 0.9999s;
        }
        @keyframes blink {
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-white shadow-sm z-50">
        <div class="flex items-center justify-between px-4 py-3">
            <h1 class="text-xl font-bold">AI阅读助手</h1>
            <div class="flex items-center space-x-4">
                <i class="fas fa-ellipsis-v text-gray-600 text-lg"></i>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 - 聊天界面 -->
    <main class="mt-16 mb-28 px-4">
        <div id="chat-container" class="chat-container py-4">
            <!-- 欢迎消息 -->
            <div class="flex mb-4">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-robot text-blue-500"></i>
                </div>
                <div class="ml-3 bg-white p-3 rounded-lg rounded-tl-none shadow-sm max-w-[80%]">
                    <p class="text-gray-800">你好！我是你的AI阅读助手。我可以帮你：</p>
                    <ul class="text-gray-700 text-sm mt-2 list-disc pl-4">
                        <li>解答阅读中的问题</li>
                        <li>讲解故事中的难词</li>
                        <li>创作有趣的故事</li>
                        <li>提供阅读建议</li>
                    </ul>
                </div>
            </div>

            <!-- 正在输入指示器 -->
            <div id="typing-indicator" class="flex mb-4 typing-indicator">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-robot text-blue-500"></i>
                </div>
                <div class="ml-3 bg-white p-3 rounded-lg rounded-tl-none shadow-sm">
                    <div class="flex items-center">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 消息输入框 -->
    <div class="message-input px-4 py-3 border-t border-gray-200">
        <div class="flex items-center">
            <button class="p-2 rounded-full bg-gray-100 text-gray-600 mr-2">
                <i class="fas fa-microphone"></i>
            </button>
            <div class="flex-1 bg-gray-100 rounded-full px-4 py-2 flex items-center">
                <input id="message-input" type="text" placeholder="输入你的问题..." class="bg-transparent w-full focus:outline-none">
                <button class="ml-2 text-gray-500">
                    <i class="fas fa-image"></i>
                </button>
            </div>
            <button id="send-button" class="p-2 rounded-full bg-blue-500 text-white ml-2">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="flex justify-around py-3">
            <a href="home.html" class="text-gray-400">
                <i class="fas fa-home text-xl"></i>
                <p class="text-xs mt-1">首页</p>
            </a>
            <a href="reading.html" class="text-gray-400">
                <i class="fas fa-book-open text-xl"></i>
                <p class="text-xs mt-1">阅读</p>
            </a>
            <a href="video-feed.html" class="text-gray-400">
                <i class="fas fa-play-circle text-xl"></i>
                <p class="text-xs mt-1">视频</p>
            </a>
            <a href="ai-chat.html" class="text-blue-500">
                <i class="fas fa-comments text-xl"></i>
                <p class="text-xs mt-1">AI对话</p>
            </a>
            <a href="profile.html" class="text-gray-400">
                <i class="fas fa-user text-xl"></i>
                <p class="text-xs mt-1">我的</p>
            </a>
        </div>
    </nav>

    <script>
        // DeepSeek API配置
        const API_KEY = 'sk-a1f425a6ae214572a0bb981c72af206e';
        const API_URL = 'https://api.deepseek.com/chat/completions';
        
        // 获取DOM元素
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // 消息历史记录
        let messageHistory = [
            { role: "system", content: "你是一个专注于阅桥亲子阅读APP的AI助手，擅长讲故事、解释词汇、回答阅读相关问题，以及提供适合儿童的阅读建议。请使用简单易懂的语言，适合与孩子一起阅读。" }
        ];
        
        // 添加用户消息到聊天界面
        function addUserMessage(message) {
            const userMessageHtml = `
                <div class="flex justify-end mb-4">
                    <div class="mr-3 bg-blue-500 p-3 rounded-lg rounded-tr-none shadow-sm text-white max-w-[80%]">
                        <p>${message}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-user text-gray-500"></i>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', userMessageHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 添加AI消息到聊天界面
        function addAIMessage(message) {
            const aiMessageHtml = `
                <div class="flex mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-robot text-blue-500"></i>
                    </div>
                    <div class="ml-3 bg-white p-3 rounded-lg rounded-tl-none shadow-sm max-w-[80%]">
                        <p class="text-gray-700">${message}</p>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', aiMessageHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 显示正在输入指示器
        function showTypingIndicator() {
            typingIndicator.style.display = 'flex';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 隐藏正在输入指示器
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }
        
        // 发送消息到DeepSeek API
        async function sendMessageToAPI(message) {
            try {
                // 添加用户消息到历史记录
                messageHistory.push({ role: "user", content: message });
                
                // 显示正在输入指示器
                showTypingIndicator();
                
                // 调用DeepSeek API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messageHistory,
                        stream: false
                    })
                });
                
                // 处理API响应
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // 隐藏正在输入指示器
                hideTypingIndicator();
                
                // 添加AI回复到界面
                addAIMessage(aiResponse);
                
                // 添加AI回复到历史记录
                messageHistory.push({ role: "assistant", content: aiResponse });
                
            } catch (error) {
                console.error('API请求错误:', error);
                hideTypingIndicator();
                addAIMessage('抱歉，我遇到了一些问题，请稍后再试。');
            }
        }
        
        // 发送消息事件处理
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                addUserMessage(message);
                messageInput.value = '';
                sendMessageToAPI(message);
            }
        }
        
        // 绑定事件监听器
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 初始化页面时滚动到底部
        chatContainer.scrollTop = chatContainer.scrollHeight;
    </script>
</body>
</html>
