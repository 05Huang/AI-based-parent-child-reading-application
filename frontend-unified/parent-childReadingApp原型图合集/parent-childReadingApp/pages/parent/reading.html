<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-white shadow-sm z-50">
        <div class="flex items-center justify-between px-4 py-3">
            <h1 class="text-xl font-bold">我的书架</h1>
            <div class="flex items-center space-x-4">
                <i class="fas fa-search text-gray-600 text-lg"></i>
                <i class="fas fa-plus text-gray-600 text-lg"></i>
            </div>
        </div>
        <!-- 分类标签 -->
        <div class="flex space-x-4 px-4 py-2 overflow-x-auto">
            <button class="px-4 py-1 bg-blue-500 text-white rounded-full text-sm">全部</button>
            <button class="px-4 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">在读</button>
            <button class="px-4 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">已读</button>
            <button class="px-4 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">想读</button>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="mt-24 mb-20 px-4">
        <!-- 最近阅读 -->
        <section class="mb-8">
            <h2 class="text-lg font-semibold mb-4">继续阅读</h2>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex space-x-4">
                    <img src="https://img2.doubanio.com/view/subject/s/public/s1627374.jpg" 
                         class="w-20 h-28 object-cover rounded-lg flex-shrink-0" 
                         alt="西游记封面">
                    <div class="flex-1">
                        <h3 class="font-medium">西游记</h3>
                        <p class="text-sm text-gray-500 mt-1">已读进度：35%</p>
                        <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
                            <div class="bg-blue-500 h-2 rounded-full" style="width: 35%"></div>
                        </div>
                        <button class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-full text-sm">继续阅读</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 书籍列表 -->
        <section>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1076932.jpg" 
                         class="w-full h-40 object-cover rounded-lg mb-3" 
                         alt="三国演义封面">
                    <h3 class="font-medium">三国演义</h3>
                    <p class="text-sm text-gray-500 mt-1">罗贯中</p>
                    <div class="flex items-center mt-2">
                        <div class="text-yellow-400 text-sm">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="far fa-star"></i>
                        </div>
                        <span class="text-sm text-gray-500 ml-2">4.0</span>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <img src="https://img2.doubanio.com/view/subject/s/public/s1147854.jpg" 
                         class="w-full h-40 object-cover rounded-lg mb-3" 
                         alt="水浒传封面">
                    <h3 class="font-medium">水浒传</h3>
                    <p class="text-sm text-gray-500 mt-1">施耐庵</p>
                    <div class="flex items-center mt-2">
                        <div class="text-yellow-400 text-sm">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </div>
                        <span class="text-sm text-gray-500 ml-2">4.5</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="flex justify-around py-3">
            <a href="home.html" class="text-gray-400">
                <i class="fas fa-home text-xl"></i>
                <p class="text-xs mt-1">首页</p>
            </a>
            <a href="reading.html" class="text-blue-500">
                <i class="fas fa-book-open text-xl"></i>
                <p class="text-xs mt-1">阅读</p>
            </a>
            <a href="video-feed.html" class="text-gray-400">
                <i class="fas fa-play-circle text-xl"></i>
                <p class="text-xs mt-1">视频</p>
            </a>
            <a href="ai-chat.html" class="text-gray-400">
                <i class="fas fa-comments text-xl"></i>
                <p class="text-xs mt-1">AI对话</p>
            </a>
            <a href="profile.html" class="text-gray-400">
                <i class="fas fa-user text-xl"></i>
                <p class="text-xs mt-1">我的</p>
            </a>
        </div>
    </nav>
</body>
</html>
