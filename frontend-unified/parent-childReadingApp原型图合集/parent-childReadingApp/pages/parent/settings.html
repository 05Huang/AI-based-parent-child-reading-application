<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-white shadow-sm z-50">
        <div class="flex items-center px-4 py-3">
            <button class="text-gray-600" onclick="history.back()">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-xl font-bold ml-4">设置</h1>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="mt-14 mb-20">
        <!-- 账号设置 -->
        <section class="mt-4 bg-white">
            <div class="divide-y">
                <a href="#" class="flex items-center justify-between p-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-user-circle text-gray-400"></i>
                        <span>账号与安全</span>
                    </div>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </a>
                <a href="#" class="flex items-center justify-between p-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-bell text-gray-400"></i>
                        <span>消息通知</span>
                    </div>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </a>
                <a href="#" class="flex items-center justify-between p-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-shield-alt text-gray-400"></i>
                        <span>隐私设置</span>
                    </div>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </a>
            </div>
        </section>

        <!-- 阅读设置 -->
        <section class="mt-4 bg-white">
            <div class="divide-y">
                <div class="p-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-moon text-gray-400"></i>
                            <span>深色模式</span>
                        </div>
                        <div class="relative inline-block w-12 h-6 rounded-full bg-gray-200">
                            <div class="absolute left-1 top-1 w-4 h-4 rounded-full bg-white shadow transition-transform"></div>
                        </div>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-text-height text-gray-400"></i>
                            <span>字体大小</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-sm text-gray-500">标准</span>
                            <i class="fas fa-chevron-right text-gray-400"></i>
                        </div>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-wifi text-gray-400"></i>
                            <span>离线阅读</span>
                        </div>
                        <div class="relative inline-block w-12 h-6 rounded-full bg-blue-500">
                            <div class="absolute right-1 top-1 w-4 h-4 rounded-full bg-white shadow transition-transform"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 其他设置 -->
        <section class="mt-4 bg-white">
            <div class="divide-y">
                <a href="#" class="flex items-center justify-between p-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-info-circle text-gray-400"></i>
                        <span>关于我们</span>
                    </div>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </a>
                <a href="#" class="flex items-center justify-between p-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-question-circle text-gray-400"></i>
                        <span>帮助与反馈</span>
                    </div>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </a>
                <div class="p-4">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-code text-gray-400"></i>
                        <span>版本号</span>
                        <span class="text-sm text-gray-500">1.0.0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 退出登录按钮 -->
        <div class="px-4 mt-8">
            <button class="w-full py-4 text-red-500 bg-white rounded-xl font-medium">退出登录</button>
        </div>
    </main>
</body>
</html>
