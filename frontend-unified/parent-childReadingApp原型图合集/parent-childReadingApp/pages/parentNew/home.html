<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅桥亲子阅读APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- 顶部导航 -->
    <nav class="fixed top-0 left-0 right-0 bg-blue-500 z-50">
        <div class="flex items-center justify-between px-4 py-2">
        <div class="flex items-center">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=dad123&backgroundColor=b6e3f4" alt="头像" class="w-8 h-8 rounded-full">
            </div>
            <div class="flex-1 mx-4">
                <div class="bg-white/20 rounded-full flex items-center px-4 py-1">
                    <i class="fas fa-search text-white/60"></i>
                    <input type="text" placeholder="搜索感兴趣的书籍" class="bg-transparent text-white placeholder-white/60 ml-2 w-full focus:outline-none text-sm">
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <i class="fas fa-envelope text-white"></i>
                <i class="fas fa-qrcode text-white"></i>
            </div>
        </div>
        <!-- 分类导航 -->
        <div class="flex space-x-4 px-4 py-2 overflow-x-auto text-white/90 text-sm">
            <span class="whitespace-nowrap">推荐</span>
            <span class="whitespace-nowrap">热门</span>
            <span class="whitespace-nowrap">亲子共读</span>
            <span class="whitespace-nowrap">绘本</span>
            <span class="whitespace-nowrap">童话</span>
            <span class="whitespace-nowrap">科普</span>
            <span class="whitespace-nowrap">国学</span>
            <span class="whitespace-nowrap">英语</span>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="mt-24 pb-16">
        <!-- 轮播图 -->
        <div class="px-4 mb-4">
            <div class="bg-white rounded-lg h-40 relative overflow-hidden">
                <img src="https://img1.doubanio.com/view/subject/s/public/s29053580.jpg" alt="小王子" class="w-full h-full object-cover">
                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-4">
                    <h3 class="text-white font-bold">小王子 - 经典亲子共读</h3>
                </div>
            </div>
                    </div>

        <!-- 功能区 -->
        <div class="grid grid-cols-5 gap-2 px-4 mb-4">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mb-1">
                    <i class="fas fa-book text-blue-500"></i>
                </div>
                <span class="text-xs">每日任务</span>
                    </div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mb-1">
                    <i class="fas fa-crown text-blue-500"></i>
                </div>
                <span class="text-xs">排行榜</span>
                    </div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center mb-1">
                    <i class="fas fa-star text-purple-500"></i>
                </div>
                <span class="text-xs">收藏</span>
                    </div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mb-1">
                    <i class="fas fa-history text-green-500"></i>
                </div>
                <span class="text-xs">历史</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center mb-1">
                    <i class="fas fa-calendar text-yellow-500"></i>
                </div>
                <span class="text-xs">活动</span>
        </div>
    </div>

        <!-- 推荐阅读 -->
        <div class="mb-4">
            <div class="flex justify-between items-center px-4 mb-2">
                <h3 class="text-lg font-bold">推荐阅读</h3>
                <a href="#" class="text-gray-500 text-sm">查看更多</a>
            </div>
            <div class="flex overflow-x-auto px-4 space-x-3">
                <div class="flex-shrink-0 w-32">
                    <div class="bg-white rounded-lg overflow-hidden">
                        <img src="https://img1.doubanio.com/view/subject/s/public/s1994258.jpg" alt="格林童话" class="w-full h-40 object-cover">
                        <div class="p-2">
                            <h4 class="text-sm font-medium truncate">格林童话</h4>
                            <p class="text-xs text-gray-500">6-8岁</p>
                            <div class="flex items-center mt-1">
                                <i class="fas fa-eye text-xs text-gray-400"></i>
                                <span class="text-xs text-gray-400 ml-1">2.1万</span>
                            </div>
                </div>
                    </div>
                </div>
                <div class="flex-shrink-0 w-32">
                    <div class="bg-white rounded-lg overflow-hidden">
                        <img src="https://img9.doubanio.com/view/subject/s/public/s1034062.jpg" alt="安徒生童话" class="w-full h-40 object-cover">
                        <div class="p-2">
                            <h4 class="text-sm font-medium truncate">安徒生童话</h4>
                            <p class="text-xs text-gray-500">6-8岁</p>
                            <div class="flex items-center mt-1">
                                <i class="fas fa-eye text-xs text-gray-400"></i>
                                <span class="text-xs text-gray-400 ml-1">1.8万</span>
        </div>
    </div>
                    </div>
                </div>
                <div class="flex-shrink-0 w-32">
                    <div class="bg-white rounded-lg overflow-hidden">
                        <img src="https://img1.doubanio.com/view/subject/s/public/s1451172.jpg" alt="三国演义" class="w-full h-40 object-cover">
                        <div class="p-2">
                            <h4 class="text-sm font-medium truncate">三国演义（少年版）</h4>
                            <p class="text-xs text-gray-500">9-12岁</p>
                            <div class="flex items-center mt-1">
                                <i class="fas fa-eye text-xs text-gray-400"></i>
                                <span class="text-xs text-gray-400 ml-1">1.5万</span>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>

        <!-- 热门阅读 -->
        <div class="px-4">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-bold">热门阅读</h3>
                <div class="flex items-center text-sm text-gray-500">
                    <span class="mr-2">换一换</span>
                    <i class="fas fa-sync-alt"></i>
                </div>
            </div>
            <div class="space-y-4">
                <div class="bg-white rounded-lg p-3 flex">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1127135.jpg" alt="西游记" class="w-24 h-32 object-cover rounded-lg">
                    <div class="ml-3 flex-1">
                        <h4 class="font-medium">西游记（少年版）</h4>
                        <p class="text-sm text-gray-500 mt-1">吴承恩 著</p>
                        <p class="text-xs text-gray-400 mt-1">9-12岁 · 冒险 · 神话</p>
                        <div class="flex items-center mt-2">
                            <div class="flex items-center">
                                <i class="fas fa-star text-yellow-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">9.2</span>
                </div>
                            <div class="flex items-center ml-4">
                                <i class="fas fa-eye text-gray-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">3.2万</span>
            </div>
                </div>
            </div>
                </div>
                <div class="bg-white rounded-lg p-3 flex">
                    <img src="https://img2.doubanio.com/view/subject/s/public/s1147854.jpg" alt="水浒传" class="w-24 h-32 object-cover rounded-lg">
                    <div class="ml-3 flex-1">
                <h4 class="font-medium">水浒传（少年版）</h4>
                        <p class="text-sm text-gray-500 mt-1">施耐庵 著</p>
                        <p class="text-xs text-gray-400 mt-1">9-12岁 · 历史 · 英雄</p>
                        <div class="flex items-center mt-2">
                            <div class="flex items-center">
                                <i class="fas fa-star text-yellow-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">9.0</span>
                            </div>
                            <div class="flex items-center ml-4">
                                <i class="fas fa-eye text-gray-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">2.8万</span>
            </div>
                </div>
            </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2">
        <a href="home.html" class="flex flex-col items-center text-blue-500">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs mt-1">首页</span>
        </a>
        <a href="reading.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-book-reader text-xl"></i>
            <span class="text-xs mt-1">书架</span>
        </a>
        <a href="video-feed.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-play-circle text-xl"></i>
            <span class="text-xs mt-1">视频</span>
        </a>
        <a href="ai-chat.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-comments text-xl"></i>
            <span class="text-xs mt-1">对话</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-xs mt-1">我的</span>
        </a>
    </nav>
</body>
</html>
