<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的书架</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-blue-500 z-50">
        <div class="flex items-center justify-between px-4 py-2">
            <h1 class="text-lg font-bold text-white">我的书架</h1>
            <div class="flex items-center space-x-4">
                <i class="fas fa-search text-white text-lg"></i>
                <i class="fas fa-plus text-white text-lg"></i>
            </div>
        </div>
        <!-- 分类标签 -->
        <div class="flex space-x-4 px-4 py-2 overflow-x-auto bg-white">
            <button class="px-4 py-1 bg-blue-500 text-white rounded-full text-sm whitespace-nowrap">全部</button>
            <button class="px-4 py-1 text-gray-600 rounded-full text-sm whitespace-nowrap">在读</button>
            <button class="px-4 py-1 text-gray-600 rounded-full text-sm whitespace-nowrap">已读</button>
            <button class="px-4 py-1 text-gray-600 rounded-full text-sm whitespace-nowrap">想读</button>
            <button class="px-4 py-1 text-gray-600 rounded-full text-sm whitespace-nowrap">收藏</button>
            <button class="px-4 py-1 text-gray-600 rounded-full text-sm whitespace-nowrap">最近</button>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="mt-28 mb-20 px-4">
        <!-- 最近阅读 -->
        <section class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">继续阅读</h2>
                <a href="#" class="text-sm text-gray-500">查看更多</a>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm">
                <div class="flex space-x-4">
                    <img src="https://img2.doubanio.com/view/subject/s/public/s1627374.jpg" 
                         class="w-24 h-32 object-cover rounded-lg flex-shrink-0" 
                         alt="西游记封面">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                        <h3 class="font-medium">西游记</h3>
                                <p class="text-sm text-gray-500 mt-1">吴承恩 著</p>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-bookmark text-blue-500"></i>
                            </div>
                        </div>
                        <div class="mt-2">
                            <div class="flex justify-between text-xs text-gray-500 mb-1">
                                <span>阅读进度</span>
                                <span>35%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-1">
                                <div class="bg-blue-500 h-1 rounded-full" style="width: 35%"></div>
                            </div>
                        </div>
                        <div class="mt-4 flex space-x-2">
                            <button class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-full text-sm">继续阅读</button>
                            <button class="px-4 py-2 border border-gray-300 rounded-full text-sm">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 书籍列表 -->
        <section>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-lg overflow-hidden shadow-sm">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1076932.jpg" 
                         class="w-full h-48 object-cover" 
                         alt="三国演义封面">
                    <div class="p-3">
                        <h3 class="font-medium text-sm">三国演义</h3>
                        <p class="text-xs text-gray-500 mt-1">罗贯中</p>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center">
                                <i class="fas fa-star text-yellow-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">4.0</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-500">
                                <i class="fas fa-eye mr-1"></i>
                                <span>2.1万</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg overflow-hidden shadow-sm">
                    <img src="https://img2.doubanio.com/view/subject/s/public/s1147854.jpg" 
                         class="w-full h-48 object-cover" 
                         alt="水浒传封面">
                    <div class="p-3">
                        <h3 class="font-medium text-sm">水浒传</h3>
                        <p class="text-xs text-gray-500 mt-1">施耐庵</p>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center">
                                <i class="fas fa-star text-yellow-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">4.5</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-500">
                                <i class="fas fa-eye mr-1"></i>
                                <span>1.8万</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg overflow-hidden shadow-sm">
                    <img src="https://img1.doubanio.com/view/subject/s/public/s1994258.jpg" 
                         class="w-full h-48 object-cover" 
                         alt="格林童话封面">
                    <div class="p-3">
                        <h3 class="font-medium text-sm">格林童话</h3>
                        <p class="text-xs text-gray-500 mt-1">格林兄弟</p>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center">
                                <i class="fas fa-star text-yellow-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">4.8</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-500">
                                <i class="fas fa-eye mr-1"></i>
                                <span>1.5万</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg overflow-hidden shadow-sm">
                    <img src="https://img9.doubanio.com/view/subject/s/public/s1034062.jpg" 
                         class="w-full h-48 object-cover" 
                         alt="安徒生童话封面">
                    <div class="p-3">
                        <h3 class="font-medium text-sm">安徒生童话</h3>
                        <p class="text-xs text-gray-500 mt-1">安徒生</p>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center">
                                <i class="fas fa-star text-yellow-400 text-xs"></i>
                                <span class="text-xs text-gray-500 ml-1">4.7</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-500">
                                <i class="fas fa-eye mr-1"></i>
                                <span>1.2万</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="flex justify-around py-2">
            <a href="home.html" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-home text-xl"></i>
                <span class="text-xs mt-1">首页</span>
            </a>
            <a href="reading.html" class="flex flex-col items-center text-blue-500">
                <i class="fas fa-book-open text-xl"></i>
                <span class="text-xs mt-1">书架</span>
            </a>
            <a href="video-feed.html" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-play-circle text-xl"></i>
                <span class="text-xs mt-1">视频</span>
            </a>
            <a href="ai-chat.html" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-comments text-xl"></i>
                <span class="text-xs mt-1">AI对话</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
