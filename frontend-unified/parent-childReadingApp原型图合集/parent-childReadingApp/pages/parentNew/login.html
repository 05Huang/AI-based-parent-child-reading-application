<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <main class="min-h-screen px-4 py-8 flex flex-col">
        <!-- Logo和标题 -->
        <div class="text-center mb-12">
            <div class="w-20 h-20 mx-auto mb-4 bg-blue-500 rounded-2xl flex items-center justify-center">
                <i class="fas fa-book-reader text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold">阅桥亲子阅读APP</h1>
            <p class="text-gray-500 mt-2">与AI一起探索阅读的乐趣</p>
        </div>

        <!-- 登录表单 -->
        <div class="space-y-4">
            <div class="bg-white rounded-xl p-4">
                <div class="flex items-center border-b border-gray-200 pb-2">
                    <span class="text-gray-500">+86</span>
                    <span class="mx-2 text-gray-300">|</span>
                    <input type="tel" placeholder="请输入手机号" class="flex-1 focus:outline-none">
                </div>
            </div>
            <div class="bg-white rounded-xl p-4">
                <div class="flex items-center">
                    <input type="text" placeholder="请输入验证码" class="flex-1 focus:outline-none">
                    <button class="text-blue-500 text-sm">获取验证码</button>
                </div>
            </div>
            <button class="w-full bg-blue-500 text-white py-4 rounded-xl font-medium">登录</button>
            
            <!-- 其他登录选项 -->
            <div class="text-center mt-8">
                <p class="text-gray-400 text-sm mb-4">其他登录方式</p>
                <div class="flex justify-center space-x-8">
                    <button class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center">
                        <i class="fab fa-weixin text-2xl text-green-500"></i>
                    </button>
                    <button class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center">
                        <i class="fab fa-qq text-2xl text-blue-500"></i>
                    </button>
                    <button class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center">
                        <i class="fab fa-apple text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部协议 -->
        <div class="mt-auto text-center">
            <p class="text-xs text-gray-400">
                登录即表示同意
                <a href="#" class="text-blue-500">用户协议</a>
                和
                <a href="#" class="text-blue-500">隐私政策</a>
            </p>
        </div>
    </main>
</body>
</html>
