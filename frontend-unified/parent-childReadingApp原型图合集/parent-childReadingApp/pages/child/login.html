<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 孩子版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header-gradient {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }
        .input-field {
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .login-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }
        .character {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 150px;
            height: 150px;
            opacity: 0.8;
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="header-gradient h-64 w-full absolute top-0 left-0 rounded-b-[40px]"></div>
    
    <div class="container mx-auto px-6 relative z-10">
        <div class="pt-16 pb-8 text-center">
            <h1 class="text-3xl font-bold text-white">欢迎回来！</h1>
            <p class="text-indigo-100 mt-2">准备好开始今天的阅读冒险了吗？</p>
        </div>
        
        <div class="bg-white rounded-3xl shadow-xl p-8 max-w-md mx-auto relative overflow-hidden">
            <img src="https://images.unsplash.com/photo-1511184117514-a1e34a1e1d9f?w=500&auto=format&fit=crop&q=60" alt="Reading Character" class="character">
            
            <h2 class="text-2xl font-bold text-gray-800 mb-6">登录账号</h2>
            
            <form action="home.html" method="GET">
                <div class="mb-6 relative">
                    <label for="username" class="block text-gray-700 font-medium mb-2">用户名</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" name="username" placeholder="输入你的用户名" class="input-field w-full py-3 pl-10 pr-3 rounded-xl focus:outline-none">
                    </div>
                </div>
                
                <div class="mb-8 relative">
                    <label for="password" class="block text-gray-700 font-medium mb-2">密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" placeholder="输入你的密码" class="input-field w-full py-3 pl-10 pr-3 rounded-xl focus:outline-none">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 cursor-pointer">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-indigo-500 focus:ring-indigo-400 border-gray-300 rounded">
                        <label for="remember" class="ml-2 block text-sm text-gray-700">记住我</label>
                    </div>
                    <a href="#" class="text-sm text-indigo-500 hover:text-indigo-600">忘记密码？</a>
                </div>
                
                <button type="submit" class="login-btn w-full py-3 text-white font-medium rounded-xl mb-4">
                    登录
                </button>
                
                <p class="text-center text-gray-600 text-sm">
                    还没有账号？ <a href="register.html" class="text-indigo-500 font-medium">立即注册</a>
                </p>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm mb-4">或者使用家长账号登录</p>
                <button class="w-full py-3 border border-gray-300 rounded-xl text-gray-700 font-medium flex items-center justify-center">
                    <i class="fas fa-user-tie mr-2"></i> 家长登录
                </button>
            </div>
        </div>
        
        <div class="text-center mt-8">
            <a href="../../select.html" class="text-indigo-500 flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i> 返回选择页面
            </a>
        </div>
    </div>
</body>
</html>
