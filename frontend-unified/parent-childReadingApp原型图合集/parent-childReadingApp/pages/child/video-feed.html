<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频 - 孩子版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header-gradient {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }
        .video-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        .video-card img {
            transition: transform 0.3s ease;
        }
        .video-card:hover img {
            transform: scale(1.05);
        }
        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .video-play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .video-card:hover .video-play-button {
            opacity: 1;
        }
        .category-pill {
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 header-gradient shadow-md z-50">
        <div class="flex items-center justify-between px-4 py-3">
            <h1 class="text-xl font-bold text-white">探索视频</h1>
            <div class="flex items-center space-x-4">
                <i class="fas fa-search text-white text-lg"></i>
            </div>
        </div>
        <!-- 分类标签 -->
        <div class="flex space-x-3 px-4 py-2 overflow-x-auto">
            <button class="category-pill px-4 py-1 bg-white text-indigo-600 rounded-full text-sm font-medium">全部</button>
            <button class="category-pill px-4 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm">故事解读</button>
            <button class="category-pill px-4 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm">科普知识</button>
            <button class="category-pill px-4 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm">名著赏析</button>
            <button class="category-pill px-4 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm">名著赏析</button>
        </div>
    </header>

    <!-- 主要内容区域 -->

            </div>
            <div class="video-card bg-white rounded-xl shadow-sm overflow-hidden">

                         class="w-full h-48 object-cover" 
                         alt="视频封面">

    </main>
