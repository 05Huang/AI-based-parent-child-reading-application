<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话 - 孩子版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-indigo-500 to-purple-500 p-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <button class="mr-2 text-white">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <div class="ml-3 text-white">
                        <h2 class="text-lg font-bold">阅读小助手</h2>
                        <p class="text-sm opacity-90">让我们一起探索故事的世界</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 对话内容区域 -->
    <div class="p-4 space-y-4 mb-32">
        <!-- AI消息 -->
        <div class="flex items-start space-x-3">
            <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-robot text-purple-500"></i>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm max-w-[80%]">
                <p class="text-sm">你好呀！我看到你在读《小王子》，真是一本很棒的书！你最喜欢书中的哪个角色呢？</p>
                <!-- 快速回复选项 -->
                <div class="mt-3 flex flex-wrap gap-2">
                    <button class="px-3 py-1 bg-purple-50 text-purple-500 rounded-full text-sm">
                        小王子
                    </button>
                    <button class="px-3 py-1 bg-purple-50 text-purple-500 rounded-full text-sm">
                        狐狸
                    </button>
                    <button class="px-3 py-1 bg-purple-50 text-purple-500 rounded-full text-sm">
                        玫瑰
                    </button>
                </div>
            </div>
        </div>

        <!-- 用户消息 -->
        <div class="flex items-start space-x-3 justify-end">
            <div class="bg-purple-500 p-3 rounded-xl shadow-sm max-w-[80%]">
                <p class="text-sm text-white">我最喜欢狐狸！它说的话很有意思。</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-user text-gray-500"></i>
            </div>
        </div>

        <!-- AI回应 -->
        <div class="flex items-start space-x-3">
            <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-robot text-purple-500"></i>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm max-w-[80%]">
                <p class="text-sm">狐狸确实很有智慧！它教会了小王子什么是"驯服"。让我们来玩个游戏吧：</p>
                <!-- 互动游戏卡片 -->
                <div class="mt-3 bg-purple-50 p-3 rounded-lg">
                    <h4 class="font-medium text-sm mb-2">🎮 记忆配对游戏</h4>
                    <p class="text-sm text-gray-600">找出狐狸说过的话和它想表达的含义</p>
                    <button class="mt-2 px-4 py-1.5 bg-purple-500 text-white rounded-full text-sm">
                        开始游戏
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 表情和互动工具栏 -->
    <div class="fixed bottom-20 left-0 right-0 bg-white border-t p-2">
        <div class="flex justify-around">
            <button class="p-2 text-gray-400">
                <i class="fas fa-smile text-xl"></i>
            </button>
            <button class="p-2 text-gray-400">
                <i class="fas fa-image text-xl"></i>
            </button>
            <button class="p-2 text-gray-400">
                <i class="fas fa-gamepad text-xl"></i>
            </button>
            <button class="p-2 text-gray-400">
                <i class="fas fa-gift text-xl"></i>
            </button>
        </div>
    </div>

    <!-- 输入框 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-2">
        <div class="flex items-center gap-2 px-2">
            <button class="p-2">
                <i class="fas fa-microphone text-gray-400"></i>
            </button>
            <input type="text" 
                   class="flex-1 bg-gray-100 rounded-full px-4 py-2 text-sm"
                   placeholder="说点什么吧...">
            <button class="p-2">
                <i class="fas fa-paper-plane text-purple-500"></i>
            </button>
        </div>
    </div>
</body>
</html>
