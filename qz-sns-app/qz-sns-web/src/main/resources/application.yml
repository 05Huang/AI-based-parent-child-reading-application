server:
  port: 8888
  address: 0.0.0.0  # 允许外部访问（开发环境使用，生产环境需要配置安全策略）
spring:
  profiles:
    active: dev # 环境 dev|test|prod
  application:
    name: qz-sns-web
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  global-config:
    db-config:
      id-type: AUTO # ID自增
  configuration:
    map-underscore-to-camel-case: true  #开启自动驼峰命名规则
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  accessToken:
    expireIn: 86400 #一天 (24小时 * 60分钟 * 60秒 = 86400秒)
    secret: MIIBIjANBgkq
  refreshToken:
    expireIn: 604800 #7天
    secret: IKDiqVmn0VFU



